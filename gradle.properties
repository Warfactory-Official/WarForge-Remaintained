# Gradle settings
org.gradle.logging.stacktrace = all
org.gradle.jvmargs = -Xmx4G
org.gradle.daemon = true

# Increase HTTP timeout/retry windows for large artifact transfers (Forge userdev + MC decompile).
systemProp.org.gradle.internal.http.connectionTimeout = 150000
systemProp.org.gradle.internal.http.socketTimeout = 600000

## Mod metadata (consumed by build.gradle and mods.toml processing)
