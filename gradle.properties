modName = WarForge Factions Remaintained
modGroup = com.flansmod.warforge
modVersion = 2.2.0
modArchivesBaseName = warforge-remaintained
modAuthors = Flan, MrNorwood, EightXOR8, Movblock
modDescription = Unofficial continuation of the WarForge factions mod, with new features and systems.

## Toolchain / platform versions
minecraftVersion = 1.20.1
forgeVersion = 47.3.0
# Parchment mapping export for 1.20.1 (Mojang names + parameter names)
parchmentVersion = 2023.09.03
