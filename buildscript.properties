#
# The "buildscript.properties" file contains settings loaded and used by the "build.gradle" file.
# For settings loaded in all gradle files or custom settings, use "gradle.properties" instead.
#

# The name of your mod. Can be any sequence of characters.
modName = WarForge Factions Remaintained

# This is a case-sensitive string to identify your mod.
modId = warforge

# Project package location.
modGroup = com.flansmod.warforge

# Whether to use the old jar naming structure (modid-mcversion-version) instead of the new version (modid-version)
includeMCVersionJar = false

# The name of your jar when you produce builds, not including any versioning info
modArchivesBaseName = warforge-remaintained

# Will update your build.gradle automatically whenever an update is available
autoUpdateBuildScript = false

minecraftVersion = 1.12.2

# Select a username for testing your mod with breakpoints. You may leave this empty for a random username each time you
# restart Minecraft in development.
developmentEnvironmentUserName = Developer

# Enables using modern java syntax (up to version 25) via JvmDowngrader, while still targeting JVM 8.
# Using this requires that you use a Java 25 JDK for development.
enableModernJavaSyntax = true

# Enables runClient/runServer tasks for Java 17, Java 21 and Java 25 using LWJGL3ify.
enableJava17RunTasks = true

# Generate a class with String fields for the mod id, name and version named with the fields below
generateGradleTokenClass = com.flansmod.warforge.Tags
gradleTokenModId = MODID
gradleTokenModName = MODNAME
gradleTokenVersion = VERSION

# In case your mod provides an API for other mods to implement you may declare its package here. Otherwise, you can
# leave this property empty.
apiPackage =

# If you want to keep your API code in src/api instead of src/main
useSrcApiPath = false

# Specify the configuration file for Forge's access transformers here. It must be placed into /src/main/resources/
accessTransformersFile = warforge_at.cfg

# Provides setup for Mixins if enabled. If you don't know what mixins are: Keep it disabled!
usesMixins = true
# Specify the package that contains all of your Mixins. You may only place Mixins in this package or the build will fail!
mixinsPackage = common.mixins
# Location of the mixin config refmap. If left blank, defaults to "mixins.${modId}.refmap.json".
mixinConfigRefmap =
# Automatically generates a mixin config json if enabled, with the name mixins.modid.json
generateMixinConfig = true
# Specify the core mod entry class if you use a core mod. This class must implement IFMLLoadingPlugin!
coreModClass = common.WarForgeCore
# If your project is only a consolidation of mixins or a core mod and does NOT contain a 'normal' mod you want this true.
containsMixinsAndOrCoreModOnly = false

# Enables Mixins even if this mod doesn't use them, useful if one of the dependencies uses mixins.
forceEnableMixins = false

# Outputs pre-transformed and post-transformed loaded classes to run/CLASSLOADER_TEMP.
enableCoreModDebug = false

# Adds CurseMaven, Modrinth Maven, BlameJared maven, and some more well-known 1.12.2 repositories
includeWellKnownRepositories = true

# Adds JEI and TheOneProbe to your development environment.
includeCommonDevEnvMods = true

# Strip forge version requirements from a dependency mod (requires mixins).
stripForgeRequirements = false

# If enabled, you may use 'shadowCompile'/'shadowImplementation' for dependencies. They will be integrated in your jar.
usesShadowedDependencies = true
# If disabled, won't remove unused classes from shaded dependencies.
minimizeShadowedDependencies = true
# If disabled, won't rename the shadowed classes.
relocateShadowedDependencies = true

# Separate run directories into "run/client" for runClient task, and "run/server" for runServer task.
separateRunDirectories = false

# The display name format of versions published to Curse and Modrinth. $MOD_NAME and $VERSION are available variables.
versionDisplayFormat = $MOD_NAME \u2212 $VERSION

# Publishing to modrinth requires you to set the MODRINTH_API_KEY environment variable.
modrinthProjectId =
modrinthRelations =

# Publishing to CurseForge requires you to set the CURSEFORGE_API_KEY environment variable.
curseForgeProjectId =
curseForgeRelations =

# This project's release type on CurseForge and/or Modrinth. Allowed types: release, beta, alpha
releaseType = release

# Generate a default changelog for releases.
generateDefaultChangelog = false

# Prevent the source code from being published
noPublishedSources = false

# Publish to a custom maven location. Leave empty to disable publishing.
# Overridable at publish time with the MAVEN_URL environment variable; credentials come from MAVEN_USER / MAVEN_PASSWORD.
customMavenPublishUrl = https://repo.warfactory.co/releases

# The group for maven artifacts. Defaults to the 'project.modGroup' until the last '.' (if any).
mavenArtifactGroup = com.flansmod.warforge

# Enable spotless checks
enableSpotless = false

# Enable JUnit testing platform used for testing your code.
enableJUnit = true

# Deployment debug setting
deploymentDebug = false
