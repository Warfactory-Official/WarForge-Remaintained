modLoader="javafml"
loaderVersion="[47,)"
license="All Rights Reserved"
issueTrackerURL="https://github.com/Warfactory-Offical/WarForge-Remaintained/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''
logoFile=""

# Mixin configs (loaded in dev runs and from the built jar alike).
[[mixins]]
config="mixins.${mod_id}.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.20.1,1.21)"
    ordering="NONE"
    side="BOTH"

# Optional integrations (re-enabled in Phase F once 1.20.1 coordinates are pinned).
[[dependencies.${mod_id}]]
    modId="modularui"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="journeymap"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="CLIENT"
